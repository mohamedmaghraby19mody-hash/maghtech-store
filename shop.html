<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maghtech | Shop</title>
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <nav class="navbar-shop">
        <div class="logo">MAGH<span>TECH</span></div>
        <a href="home.html" class="back-home"><i class="fa-solid fa-house"></i> Home</a>
    </nav>

    <header class="shop-header">
        <h1>Our Full <span>Inventory</span></h1>
        <p>Explore the best hardware components in the market.</p>

        <div class="search-container">
            <form action="" method="GET">
                <input type="text" name="search" placeholder="Search for GPU, RAM, SSD..." class="search-input">
                <button type="submit" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </form>
        </div>
    </header>

    <section class="products-display">
        <div class="shop-grid">
            <div class="shop-card">
                <div class="card-img"><img
                        src="https://images.unsplash.com/photo-1591488320449-011701bb6704?auto=format&fit=crop&q=80&w=500">
                </div>
                <div class="card-body">
                    <span class="category">GPU</span>
                    <h4>RTX 4090 Gaming OC</h4>
                    <p class="price">$1,599</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="shop-card">
                <div class="card-img"><img
                        src="https://images.unsplash.com/photo-1562976540-1502c2145186?auto=format&fit=crop&q=80&w=500">
                </div>
                <div class="card-body">
                    <span class="category">RAM</span>
                    <h4>Corsair Vengeance 32GB</h4>
                    <p class="price">$125</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="shop-card">
                <div class="card-img"><img src="imgs/aakash-malik-fkbFXR00nic-unsplash.jpg">
                </div>
                <div class="card-body">
                    <span class="category">Storage</span>
                    <h4>Samsung 990 Pro 2TB</h4>
                    <p class="price">$170</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="shop-card">
                <div class="card-img"><img src="imgs/pexels-rogeer-marques-42038281-11272008.jpg">
                </div>
                <div class="card-body">
                    <span class="category">CPU</span>
                    <h4>Intel i9-14900K</h4>
                    <p class="price">$580</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="shop-card">
                <div class="card-img"><img
                        src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=500">
                </div>
                <div class="card-body">
                    <span class="category">Motherboard</span>
                    <h4>ASUS ROG Z790</h4>
                    <p class="price">$450</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="shop-card">
                <div class="card-img"><img src="imgs/marcin-kempa-SsI775V5cDU-unsplash (1).jpg">
                </div>
                <div class="card-body">
                    <span class="category">Power Supply</span>
                    <h4>EVGA 1000W Gold</h4>
                    <p class="price">$190</p>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
