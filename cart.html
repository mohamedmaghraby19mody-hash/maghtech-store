<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maghtech | Your Cart</title>
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">MAGH<span>TECH</span></div>
        <a href="home.html" class="continue-shopping"><i class="fa-solid fa-chevron-left"></i> Continue Shopping</a>
    </nav>

    <section class="cart-wrapper">
        <div class="cart-container">
            <h2>Your <span>Cart</span></h2>

            <div class="cart-table">
                <div class="cart-item">
                    <img src="https://images.unsplash.com/photo-1591488320449-011701bb6704?auto=format&fit=crop&q=80&w=200"
                        alt="GPU">
                    <div class="item-info">
                        <h4>RTX 4090 Gaming OC</h4>
                        <p>In Stock</p>
                    </div>
                    <div class="item-quantity">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                    <div class="item-price">$1,599</div>
                    <button class="remove-item"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>$1,599.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>$1,599.00</span>
                </div>
                <button class="checkout-btn">Proceed to Checkout</button>
            </div>
        </div>
    </section>

</body>

</html>
