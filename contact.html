<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maghtech | Contact Us</title>
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">MAGH<span>TECH</span></div>
        <a href="home.html" class="back-link"><i class="fa-solid fa-house"></i> Home</a>
    </nav>

    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-info">
                <h2>Get in <span>Touch</span></h2>
                <p>Have a question about a build or need technical support? We're here to help.</p>

                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <div>
                        <h4>Location</h4>
                        <p>Maadi, Cairo, Egypt</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <div>
                        <h4>Phone</h4>
                        <p>+20 123 456 789</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>support@maghtech.com</p>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <form action="#">
                    <div class="input-group">
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="Your Email" required>
                    </div>
                    <div class="input-group">
                        <input type="text" placeholder="Subject">
                    </div>
                    <div class="input-group">
                        <textarea placeholder="How can we help you?" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="send-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

</body>

</html>
